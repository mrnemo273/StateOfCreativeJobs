name: Refresh Snapshots

on:
  schedule:
    # Run twice weekly: Monday and Thursday at 6am UTC
    # This keeps SerpApi under 100 searches/month free-tier limit
    - cron: "0 6 * * 1,4"
  workflow_dispatch: # Allow manual trigger from Actions tab

permissions:
  contents: write # Needed for git push

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          ONET_API_KEY: ${{ secrets.ONET_API_KEY }}
        run: npm run build

      - name: Refresh all snapshots
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          ONET_API_KEY: ${{ secrets.ONET_API_KEY }}
          REFRESH_SECRET: ${{ secrets.REFRESH_SECRET }}
        run: bash scripts/refresh-snapshots.sh

      - name: Commit and push updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/snapshots/
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit"
          else
            git commit -m "chore: refresh snapshots"
            git pull --rebase
            git push
          fi
