name: Refresh Snapshots

on:
  schedule:
    # Run weekly on Monday at 6am UTC
    - cron: "0 6 * * 1"
  workflow_dispatch: # Allow manual trigger from Actions tab

permissions:
  contents: write # Needed for git push

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          ONET_API_KEY: ${{ secrets.ONET_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run build

      - name: Refresh all snapshots
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          ONET_API_KEY: ${{ secrets.ONET_API_KEY }}
          REFRESH_SECRET: ${{ secrets.REFRESH_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bash scripts/refresh-snapshots.sh

      - name: Commit and push updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/snapshots/ src/data/intelligence/ src/lib/cachedLandingData.ts src/lib/cachedEnrichmentData.ts
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit"
          else
            git commit -m "chore: refresh snapshots"
            git pull --rebase
            git push
          fi

      # Monthly report generation — run manually or when triggered on first Monday
      - name: Generate monthly PDF report (manual only)
        if: github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node scripts/generate-editorial.mjs || echo "Editorial generation skipped"
          node scripts/generate-monthly-report.mjs || echo "Report generation skipped"
          if ls public/reports/*.pdf 1>/dev/null 2>&1; then
            git add src/data/editorials/ public/reports/
            if ! git diff --cached --quiet; then
              git commit -m "chore: generate monthly editorial and PDF report"
              git pull --rebase
              git push
            fi
          fi

      # Send email digests after snapshot refresh
      - name: Send weekly email digests
        if: github.event.schedule
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
        run: node scripts/generate-digest.mjs --type weekly || echo "Digest sending skipped"
