<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>State of Creative Jobs — {{subjectLine}}</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
  <style>
    /* ─── Reset ─────────────────────────────────────────────── */
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
    body { margin: 0; padding: 0; width: 100% !important; }

    /* ─── Design System Inlined ──────────────────────────────── */
    .body-bg { background-color: #F5F3EE; }
    .card-bg { background-color: #FFFFFF; }
    .text-ink { color: #0A0A0A; }
    .text-dark { color: #1A1A1A; }
    .text-mid { color: #6B6B6B; }
    .text-light { color: #C8C4BC; }
    .text-up { color: #4A6E52; }
    .text-down { color: #8B5A5A; }
    .text-neutral { color: #7A6D42; }
    .text-accent { color: #1A1A6B; }
    .border-ink { border-color: #0A0A0A; }
    .border-light { border-color: #C8C4BC; }
    .border-faint { border-color: #ECEAE4; }

    .font-mono {
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      font-variant-numeric: tabular-nums;
    }
    .font-sans {
      font-family: 'DM Sans', 'Helvetica Neue', Helvetica, sans-serif;
    }
    .font-display {
      font-family: 'DM Serif Display', Georgia, serif;
    }

    /* ─── Responsive ────────────────────────────────────────── */
    @media screen and (max-width: 600px) {
      .container { width: 100% !important; padding: 16px !important; }
      .role-section { padding: 16px !important; }
    }
  </style>
</head>
<body class="body-bg" style="margin: 0; padding: 0; background-color: #F5F3EE;">

  <!-- Outer wrapper -->
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color: #F5F3EE;">
    <tr>
      <td align="center" style="padding: 32px 16px;">

        <!-- Container -->
        <table role="presentation" class="container" width="560" cellspacing="0" cellpadding="0" border="0" style="max-width: 560px; width: 100%;">

          <!-- Header -->
          <tr>
            <td style="padding-bottom: 24px; border-bottom: 1px solid #0A0A0A;">
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                <tr>
                  <td>
                    <span class="font-mono" style="font-family: 'IBM Plex Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: #0A0A0A; font-weight: 500;">
                      State of Creative Jobs
                    </span>
                  </td>
                  <td align="right">
                    <span class="font-mono" style="font-family: 'IBM Plex Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: #6B6B6B;">
                      {{digestType}} &middot; {{digestDate}}
                    </span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Spacer -->
          <tr><td style="height: 24px;"></td></tr>

          <!-- Role sections -->
          {{roleSections}}

          <!-- Divider -->
          <tr>
            <td style="padding: 24px 0; border-top: 1px solid #0A0A0A;">
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                <tr>
                  <td>
                    <a href="{{siteUrl}}" class="font-mono" style="font-family: 'IBM Plex Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: #1A1A6B; text-decoration: none;">
                      View full dashboard &rarr;
                    </a>
                  </td>
                </tr>
                {{#editorialUrl}}
                <tr>
                  <td style="padding-top: 8px;">
                    <a href="{{editorialUrl}}" class="font-mono" style="font-family: 'IBM Plex Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: #6B6B6B; text-decoration: none;">
                      Read latest editorial &rarr;
                    </a>
                  </td>
                </tr>
                {{/editorialUrl}}
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding-top: 16px; border-top: 1px solid #C8C4BC;">
              <p class="font-mono" style="font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #6B6B6B; line-height: 1.6; margin: 0;">
                You're receiving this because you subscribed to the State of Creative Jobs digest.
              </p>
              <p style="margin: 8px 0 0 0;">
                <a href="{{unsubscribeUrl}}" class="font-mono" style="font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #6B6B6B; text-decoration: underline;">
                  Unsubscribe
                </a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
