<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feature Review — State of Creative Jobs</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ink: #0A0A0A;
    --paper: #F5F3EE;
    --white: #FFFFFF;
    --mid: #6B6B6B;
    --light: #C8C4BC;
    --faint: #ECEAE4;
    --up: #1A6B3A;
    --up-bg: #EAF4EE;
    --down: #8B1A1A;
    --down-bg: #F7EAEA;
    --accent: #1A1A6B;
    --accent-bg: #EAEAF7;
    --neutral: #5A4E2A;
    --neutral-bg: #F5F0E4;
  }

  body {
    font-family: 'DM Sans', 'Helvetica Neue', sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.6;
  }

  /* ── Header ── */
  .masthead {
    padding: 3rem 4rem 2rem;
    border-bottom: 1px solid var(--ink);
  }
  .masthead h1 {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 400;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
  }
  .masthead p {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--mid);
  }

  /* ── Summary bar ── */
  .summary-bar {
    display: flex;
    gap: 2rem;
    padding: 1.25rem 4rem;
    border-bottom: 1px solid var(--light);
    background: var(--white);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    flex-wrap: wrap;
  }
  .summary-stat { display: flex; gap: 0.5rem; align-items: center; }
  .summary-stat .label { color: var(--mid); text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.65rem; }
  .summary-stat .value { font-weight: 600; font-variant-numeric: tabular-nums; }
  .summary-stat .value.approved { color: var(--up); }
  .summary-stat .value.rejected { color: var(--down); }
  .summary-stat .value.pending { color: var(--neutral); }

  /* ── Category nav ── */
  .category-nav {
    display: flex;
    gap: 0;
    padding: 0 4rem;
    border-bottom: 1px solid var(--light);
    background: var(--white);
    overflow-x: auto;
  }
  .category-tab {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 0.875rem 1.25rem;
    cursor: pointer;
    color: var(--mid);
    border: none;
    background: none;
    border-bottom: 2px solid transparent;
    transition: color 80ms, border-color 80ms;
    white-space: nowrap;
  }
  .category-tab:hover { color: var(--ink); }
  .category-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── Content area ── */
  .content { padding: 2rem 4rem 4rem; max-width: 1400px; margin: 0 auto; }

  .category-section { margin-bottom: 3rem; }
  .category-header {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--mid);
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--ink);
    margin-bottom: 1.5rem;
  }

  /* ── Feature cards ── */
  .feature-card {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 2rem;
    background: var(--white);
    border: 1px solid var(--light);
    padding: 2rem;
    margin-bottom: 1.25rem;
    transition: border-color 80ms;
    position: relative;
  }
  .feature-card:hover { border-color: var(--ink); }
  .feature-card.state-approved { border-left: 3px solid var(--up); }
  .feature-card.state-rejected { border-left: 3px solid var(--down); opacity: 0.55; }

  .feature-id {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--mid);
    margin-bottom: 0.25rem;
  }
  .feature-title {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 1.35rem;
    font-weight: 400;
    margin-bottom: 0.75rem;
    line-height: 1.2;
  }
  .feature-desc {
    font-size: 0.9rem;
    color: var(--ink);
    line-height: 1.65;
    margin-bottom: 1rem;
    max-width: 60ch;
  }
  .feature-why {
    font-size: 0.8rem;
    color: var(--mid);
    line-height: 1.6;
    margin-bottom: 1.25rem;
    padding-left: 1rem;
    border-left: 2px solid var(--faint);
    max-width: 55ch;
  }

  .feature-meta {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 1rem;
  }
  .meta-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 0.3rem 0.6rem;
    border: 1px solid var(--light);
  }
  .meta-tag.scope-small { background: var(--up-bg); border-color: var(--up); color: var(--up); }
  .meta-tag.scope-medium { background: var(--neutral-bg); border-color: var(--neutral); color: var(--neutral); }
  .meta-tag.scope-large { background: var(--down-bg); border-color: var(--down); color: var(--down); }

  /* ── Wireframe ── */
  .wireframe-container {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .wireframe {
    background: var(--faint);
    border: 1px solid var(--light);
    padding: 1rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.55rem;
    line-height: 1.5;
    color: var(--mid);
    white-space: pre;
    overflow: hidden;
    flex: 1;
    min-height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wireframe-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--light);
    text-align: right;
    margin-bottom: 0.35rem;
  }

  /* ── Action buttons ── */
  .actions {
    display: flex;
    gap: 0.5rem;
    margin-top: auto;
    padding-top: 1rem;
  }
  .btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 0.6rem 1.2rem;
    border: 1px solid var(--ink);
    cursor: pointer;
    transition: all 80ms;
    flex: 1;
    text-align: center;
  }
  .btn-approve {
    background: var(--ink);
    color: var(--paper);
  }
  .btn-approve:hover { background: var(--up); border-color: var(--up); }
  .btn-reject {
    background: var(--white);
    color: var(--ink);
  }
  .btn-reject:hover { background: var(--down-bg); border-color: var(--down); color: var(--down); }
  .btn-reset {
    background: var(--faint);
    color: var(--mid);
    border-color: var(--light);
    flex: 0;
    padding: 0.6rem 0.75rem;
  }
  .btn-reset:hover { background: var(--white); color: var(--ink); border-color: var(--ink); }

  .status-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 0.4rem 0.8rem;
    text-align: center;
    flex: 1;
  }
  .status-approved { background: var(--up-bg); color: var(--up); border: 1px solid var(--up); }
  .status-rejected { background: var(--down-bg); color: var(--down); border: 1px solid var(--down); }

  /* ── Export bar ── */
  .export-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--ink);
    color: var(--paper);
    padding: 1rem 4rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transform: translateY(100%);
    transition: transform 200ms ease-out;
    z-index: 100;
  }
  .export-bar.visible { transform: translateY(0); }
  .export-bar p {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
  }
  .btn-export {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 0.6rem 1.5rem;
    background: var(--paper);
    color: var(--ink);
    border: none;
    cursor: pointer;
    transition: background 80ms;
  }
  .btn-export:hover { background: var(--up-bg); }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .masthead, .summary-bar, .category-nav, .content { padding-left: 1.5rem; padding-right: 1.5rem; }
    .feature-card { grid-template-columns: 1fr; }
    .wireframe { min-height: 100px; }
    .export-bar { padding: 1rem 1.5rem; }
  }
</style>
</head>

// ── State ──
const state = {};
features.forEach(f => { state[f.id] = 'pending'; });

// ── Render ──
const catNames = {
  career: "A — Career Planning & Navigation",
  data: "B — Deeper Data & Analysis",
  sharing: "C — Sharing, Reach & Distribution",
  community: "D — Community & Engagement",
  editorial: "E — Content & Editorial"
};

let activeCategory = 'all';

function renderFeatures() {
  const container = document.getElementById('featureList');
  container.innerHTML = '';

  const cats = activeCategory === 'all'
    ? Object.keys(catNames)
    : [activeCategory];

  cats.forEach(cat => {
    const catFeatures = features.filter(f => f.cat === cat);
    if (catFeatures.length === 0) return;

    const section = document.createElement('div');
    section.className = 'category-section';
    section.innerHTML = `<div class="category-header">${catNames[cat]}</div>`;

    catFeatures.forEach(f => {
      const s = state[f.id];
      const card = document.createElement('div');
      card.className = `feature-card ${s !== 'pending' ? 'state-' + s : ''}`;
      card.innerHTML = `
        <div class="feature-body">
          <div class="feature-id">${f.id}</div>
          <div class="feature-title">${f.title}</div>
          <div class="feature-desc">${f.desc}</div>
          <div class="feature-why">${f.why}</div>
          <div class="feature-meta">
            <span class="meta-tag scope-${f.scope}">${f.scope} build</span>
          </div>
          <div class="actions" id="actions-${f.id}">
            ${s === 'pending' ? `
              <button class="btn btn-approve" onclick="decide('${f.id}','approved')">Approve</button>
              <button class="btn btn-reject" onclick="decide('${f.id}','rejected')">Pass</button>
            ` : `
              <div class="status-badge status-${s}">${s}</div>
              <button class="btn btn-reset" onclick="decide('${f.id}','pending')">↺</button>
            `}
          </div>
        </div>
        <div class="wireframe-container">
          <div class="wireframe-label">Wireframe</div>
          <div class="wireframe">${f.wire}</div>
        </div>
      `;
      section.appendChild(card);
    });
    container.appendChild(section);
  });

  updateSummary();
}

function decide(id, newState) {
  state[id] = newState;
  renderFeatures();
}

function updateSummary() {
  const vals = Object.values(state);
  document.getElementById('approvedCount').textContent = vals.filter(v => v === 'approved').length;
  document.getElementById('rejectedCount').textContent = vals.filter(v => v === 'rejected').length;
  document.getElementById('pendingCount').textContent = vals.filter(v => v === 'pending').length;

  const allDecided = vals.every(v => v !== 'pending');
  const approvedAny = vals.some(v => v === 'approved');
  document.getElementById('exportBar').classList.toggle('visible', allDecided || approvedAny);
}

// ── Category tabs ──
document.querySelectorAll('.category-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeCategory = tab.dataset.cat;
    renderFeatures();
  });
});

// ── Export ──
document.getElementById('exportBtn').addEventListener('click', () => {
  const approved = features.filter(f => state[f.id] === 'approved');
  if (approved.length === 0) {
    alert('No features approved yet.');
    return;
  }
  const text = "APPROVED FEATURES\n" + "=".repeat(40) + "\n\n" +
    approved.map(f => `${f.id}. ${f.title} [${f.scope}]\n   ${f.desc}\n`).join('\n');

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('exportBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy Approved List'; }, 2000);
  });
});

// ── Init ──
renderFeatures();
</script>
